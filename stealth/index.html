<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roulette Trend Tracker • R2 • v1.66.04</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --card: #0f1a2e;
      --muted: #94a3b8;
      --txt: #e5e7eb;
      --accent: #60a5fa;
      --warn: #fbbf24;
      --danger: #ef4444;
      --ok: #34d399;
      --chip: #111c33;
      --border: #1f2a44;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #070b14, #0b1220 40%, #070b14);
      color: var(--txt);
      padding: 20px;
    }

    .wrap { max-width: 980px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 12px 0; }
    .sectionTitle { font-weight: 900; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; }
    
    /* NEW: Active Play Styles */
    @keyframes drift-flash {
      0% { background: rgba(239, 68, 68, 0.1); }
      50% { background: rgba(239, 68, 68, 0.4); }
      100% { background: rgba(239, 68, 68, 0.1); }
    }
    .drift-alert-active { animation: drift-flash 1s infinite; border: 2px solid var(--danger) !important; }
    .play-btn-small { background: var(--ok) !important; color: #000 !important; font-weight: 900; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
    
    .btn { appearance: none; border: 1px solid var(--border); background: var(--chip); color: var(--txt); padding: 10px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn.danger { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }
    
    .pill { background: var(--chip); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; font-size: 12px; color: var(--muted); display: inline-block; }
    .topplays { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .playcard { border: 1px solid var(--border); background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; }
    .playhdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .small { font-size: 12px; opacity: 0.8; line-height: 1.4; }
    .v { font-size: 18px; font-weight: 900; }
    
    /* Grid for Keypad */
    .kbd { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 15px; }
    .key { padding: 15px 5px; border-radius: 10px; border: 1px solid var(--border); background: #0c1730; color: white; font-weight: 900; cursor: pointer; }
    .key.green { background: #10b981; }
  </style>
</head>
<body>

  <div class="wrap">
    <h1 style="text-align:center;">Roulette Architect <span class="pill">v1.66.04</span></h1>

    <div id="activePlayDash" class="card" style="display:none; border-color: var(--accent); background: rgba(96,165,250,0.05);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="sectionTitle" style="color: var(--accent);">Currently Playing</div>
          <div id="lockedStrategyName" class="v">—</div>
          <div id="lockedTableState" class="pill" style="margin-top:8px;">State: —</div>
        </div>
        <button class="btn danger" id="endStrategyBtn">END STRATEGY (WIN/ABORT)</button>
      </div>
      
      <div id="driftWarning" class="card" style="display:none; margin-top:15px; border-color: var(--danger); text-align:center;">
        <div style="font-weight:900; color: var(--danger);">⚠️ ABORT: TABLE DRIFT DETECTED</div>
        <div class="small" id="driftReason">Repeats detected in last 5 spins.</div>
      </div>
    </div>

    <div id="topPlaysContainer" class="card">
      <div class="sectionTitle">Top 5 strategies right now</div>
      <div id="topPlays" class="topplays"></div>
    </div>

    <div class="card">
      <div class="sectionTitle">Input Last Spin</div>
      <div class="kbd" id="kbd">
        </div>
    </div>

    <div class="card">
      <div class="sectionTitle">Spin History (Newest First)</div>
      <div id="historyDisplay" class="small" style="word-break: break-all; font-family: monospace;">No spins yet.</div>
    </div>
  </div>

  <script>
    // --- GLOBAL DATA ---
    let spins = []; 
    let lockedPlayName = null;
    let frozenTableState = null;

    const $ = (id) => document.getElementById(id);

    // --- CORE LOGIC ---
    function addSpin(val) {
      spins.unshift({ n: val, t: Date.now() });
      if (spins.length > 100) spins.pop();
      render();
    }

    function render() {
      // 1. Update History
      $("historyDisplay").textContent = spins.map(s => s.n).join(", ") || "No spins yet.";

      // 2. Determine Table State (Simplified for Demo)
      let currentState = spins.length < 15 ? "WAITING" : "STRUCTURED";
      
      // 3. Update Recommendations or Locked View
      const scored = { state: currentState, plays: getMockPlays() };
      updateStrategyUI(scored);
      checkTableDrift();
    }

    function updateStrategyUI(scored) {
      const container = $("topPlaysContainer");
      const activeDash = $("activePlayDash");
      const list = $("topPlays");

      if (lockedPlayName) {
        container.style.display = "none";
        activeDash.style.display = "block";
        $("lockedStrategyName").textContent = lockedPlayName;
        $("lockedTableState").textContent = "Frozen State: " + frozenTableState;
        return;
      }

      container.style.display = "block";
      activeDash.style.display = "none";
      list.innerHTML = "";

      // Show Top 5
      scored.plays.slice(0, 5).forEach((p, idx) => {
        const div = document.createElement("div");
        div.className = "playcard";
        div.innerHTML = `
          <div class="playhdr">
            <div>
              <div style="font-weight:900">${idx+1}. ${p.name}</div>
              <div class="small">${p.why}</div>
            </div>
            <button class="play-btn-small" onclick="lockStrategy('${p.name}', '${scored.state}')">PLAY</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    window.lockStrategy = function(name, state) {
      lockedPlayName = name;
      frozenTableState = state;
      render();
    };

    $("endStrategyBtn").onclick = function() {
      lockedPlayName = null;
      frozenTableState = null;
      $("driftWarning").style.display = "none";
      render();
    };

    function checkTableDrift() {
      if (!lockedPlayName || spins.length < 6) return;
      const last5 = spins.slice(0, 5).map(s => s.n);
      const unique = new Set(last5);
      
      const warnBox = $("driftWarning");
      if (unique.size <= 3) { // Simple repeat detection
        warnBox.style.display = "block";
        warnBox.classList.add("drift-alert-active");
        $("driftReason").textContent = "Micro-cluster detected (Repeats in last 5)";
      } else {
        warnBox.style.display = "none";
      }
    }

    // --- UTILS ---
    function getMockPlays() {
      return [
        { name: "Cassandra Corners", why: "Strong Dozen imbalance detected." },
        { name: "12 Soldiers", why: "Vertical column pattern emerging." },
        { name: "6 Diamonds", why: "Table is in a cold/drought state." },
        { name: "Easy Street", why: "Even street distribution bias." },
        { name: "WB-RTB", why: "Balanced/Choppy table grind." }
      ];
    }

    // Build Keypad
    const kbd = $("kbd");
    const keys = ["00", 0, ...Array.from({length: 36}, (_, i) => i + 1)];
    keys.forEach(k => {
      const b = document.createElement("button");
      b.className = "key" + (k === 0 || k === "00" ? " green" : "");
      b.textContent = k;
      b.onclick = () => addSpin(k);
      kbd.appendChild(b);
    });

    render();
  </script>
</body>
</html>
